# ──────────────────────────────────────────────
#  Shared build config for all Django-based services
# ──────────────────────────────────────────────
x-django-base: &django-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - .:/app                           # live code reload — covers /app only
    # /entrypoint.sh is at container root, outside /app — never overwritten by this mount
    - sqlite_data:/app/db_volume       # persistent SQLite DB
    - media_data:/app/media            # persistent uploaded files
    - static_data:/app/staticfiles     # shared static files
  depends_on:
    redis:
      condition: service_healthy


services:

  # ── Django / Daphne ──────────────────────────
  django:
    <<: *django-base
    container_name: plumbers_django
    environment:
      SERVICE_TYPE: django             # entrypoint uses this to run migrate + daphne
    ports:
      - "8888:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Celery Worker ────────────────────────────
  celery_worker:
    <<: *django-base
    container_name: plumbers_celery_worker
    environment:
      SERVICE_TYPE: celery_worker      # entrypoint skips daphne, runs celery worker
    restart: unless-stopped

  # ── Celery Beat ──────────────────────────────
  celery_beat:
    <<: *django-base
    container_name: plumbers_celery_beat
    environment:
      SERVICE_TYPE: celery_beat        # entrypoint skips daphne, runs celery beat
    restart: unless-stopped

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: plumbers_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog ──────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: plumbers_mailhog
    restart: unless-stopped
    ports:
      - "8020:8025"                    # Mailhog UI at http://localhost:8020


volumes:
  sqlite_data:
  media_data:
  static_data: