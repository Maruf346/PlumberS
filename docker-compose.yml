# ──────────────────────────────────────────────
#  Shared build config for all Django-based services
# ──────────────────────────────────────────────
x-django-base: &django-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    # Hardcode Docker service hostnames here so Windows CRLF in .env
    # can never corrupt them. These override any values from .env.
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    EMAIL_HOST: mailhog
    EMAIL_PORT: "1025"
  volumes:
    - .:/app
    - sqlite_data:/app/db_volume
    - media_data:/app/media
    - static_data:/app/staticfiles
  depends_on:
    redis:
      condition: service_healthy
    mailhog:
      condition: service_started


services:

  # ── Django / Daphne ──────────────────────────
  django:
    <<: *django-base
    container_name: plumbers_django
    environment:
      SERVICE_TYPE: django
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
    ports:
      - "8888:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Celery Worker ────────────────────────────
  celery_worker:
    <<: *django-base
    container_name: plumbers_celery_worker
    environment:
      SERVICE_TYPE: celery_worker
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
      django:
        condition: service_healthy   # wait for migrations to finish before worker starts

  # ── Celery Beat ──────────────────────────────
  celery_beat:
    <<: *django-base
    container_name: plumbers_celery_beat
    environment:
      SERVICE_TYPE: celery_beat
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EMAIL_HOST: mailhog
      EMAIL_PORT: "1025"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      django:
        condition: service_healthy   # wait for migrations before beat starts

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: plumbers_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog ──────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: plumbers_mailhog
    restart: unless-stopped
    ports:
      - "8020:8025"


volumes:
  sqlite_data:
  media_data:
  static_data: